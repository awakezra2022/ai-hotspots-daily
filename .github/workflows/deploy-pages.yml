name: Deploy AI Hotspots Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 01:00 UTC = 09:00 Asia/Shanghai
    - cron: "0 1 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate latest hotspots data
        run: python3 scripts/fetch_ai_hotspots.py --limit 10 --site-dir site --output-dir output

      - name: Ensure site data exists
        run: test -f site/data/latest.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
